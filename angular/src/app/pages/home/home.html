<div class="home-container">
  <h1>{{ portalName }}</h1>
  <p>Welcome to the Student Course Portal. Browse courses, enroll, and track your academic progress.</p>

  <div class="stats-row">
    <div class="stat-card">
      <h3>Courses Available</h3>
      <p class="stat-value">{{ courseCount }}</p>
    </div>
    <div class="stat-card">
      <h3>Enrolled</h3>
      <p class="stat-value">{{ enrolledCount }}</p>
    </div>
    <div class="stat-card">
      <h3>GPA</h3>
      <p class="stat-value">{{ gpa }}</p>
    </div>
  </div>

  <div class="actions">
    <button [disabled]="!isPortalActive" (click)="onEnrollClick()">Enroll Now</button>
    <p *ngIf="message" class="message">{{ message }}</p>
  </div>

  <div class="search">
    <input [(ngModel)]="searchTerm" placeholder="Search courses...">
    <p>Searching for: {{ searchTerm }}</p>
  </div>
</div>
