<div class="form-container">
  <h2>Enrollment Request Form (Template-Driven)</h2>

  <div *ngIf="submitted" class="success-message">
    Enrollment request submitted successfully!
  </div>

  <form #enrollForm="ngForm" (ngSubmit)="onSubmit(enrollForm)" *ngIf="!submitted">
    <div class="form-group">
      <label for="studentName">Student Name</label>
      <input
        id="studentName"
        type="text"
        name="studentName"
        #nameCtrl="ngModel"
        [(ngModel)]="studentName"
        required
        minlength="3">
      <span class="error" *ngIf="nameCtrl.touched && nameCtrl.errors?.['required']">Name is required</span>
      <span class="error" *ngIf="nameCtrl.touched && nameCtrl.errors?.['minlength']">Name must be at least 3 characters</span>
    </div>

    <div class="form-group">
      <label for="studentEmail">Student Email</label>
      <input
        id="studentEmail"
        type="email"
        name="studentEmail"
        #emailCtrl="ngModel"
        [(ngModel)]="studentEmail"
        required
        email>
      <span class="error" *ngIf="emailCtrl.touched && emailCtrl.errors?.['required']">Email is required</span>
      <span class="error" *ngIf="emailCtrl.touched && emailCtrl.errors?.['email']">Please enter a valid email</span>
    </div>

    <div class="form-group">
      <label for="courseId">Course ID</label>
      <input
        id="courseId"
        type="number"
        name="courseId"
        #courseCtrl="ngModel"
        [(ngModel)]="courseId"
        required>
      <span class="error" *ngIf="courseCtrl.touched && courseCtrl.errors?.['required']">Course ID is required</span>
    </div>

    <div class="form-group">
      <label for="preferredSemester">Preferred Semester</label>
      <select id="preferredSemester" name="preferredSemester" [(ngModel)]="preferredSemester" required>
        <option value="Odd">Odd</option>
        <option value="Even">Even</option>
      </select>
    </div>

    <div class="form-group checkbox-group">
      <input
        id="agreeToTerms"
        type="checkbox"
        name="agreeToTerms"
        #termsCtrl="ngModel"
        [(ngModel)]="agreeToTerms"
        required>
      <label for="agreeToTerms">I agree to the terms and conditions</label>
      <span class="error" *ngIf="termsCtrl.touched && termsCtrl.errors?.['required']">You must agree to the terms</span>
    </div>

    <div class="form-actions">
      <button type="submit" [disabled]="enrollForm.invalid">Submit</button>
      <button type="button" (click)="resetForm(enrollForm)">Reset</button>
    </div>
  </form>
</div>
