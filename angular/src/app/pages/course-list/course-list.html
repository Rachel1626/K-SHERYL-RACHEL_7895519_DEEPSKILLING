<div class="course-list-container">
  <h2>Courses</h2>

  <div class="search-bar">
    <input [ngModel]="searchTerm" (ngModelChange)="filterCourses($event)" placeholder="Search courses by name or code...">
  </div>

  <p *ngIf="error$ | async as error" class="error">{{ error }}</p>

  <div *ngIf="loading$ | async" class="loading">Loading courses...</div>

  <div *ngIf="!(loading$ | async) && (courses$ | async)?.length === 0" class="no-courses">
    <p>No courses available.</p>
  </div>

  <div *ngIf="!(loading$ | async) && (courses$ | async)?.length" class="course-grid">
    <app-course-card
      *ngFor="let course of courses$ | async; trackBy: trackByCourseId"
      [course]="course"
      (enrollRequested)="onEnroll($event)">
    </app-course-card>
  </div>

  <p *ngIf="selectedCourseId" class="selected-info">Selected course ID: {{ selectedCourseId }}</p>
</div>
