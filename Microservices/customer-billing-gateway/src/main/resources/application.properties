spring.application.name=customer-billing-gateway
server.port=9091

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# Rate Limiting: RequestRateLimiter filter (requires Redis)
# spring.cloud.gateway.routes[0].filters[0].name=RequestRateLimiter
# spring.cloud.gateway.routes[0].filters[0].args.redis-rate-limiter.replenishRate=10
# spring.cloud.gateway.routes[0].filters[0].args.redis-rate-limiter.burstCapacity=20

# Customer Service Route with Path Rewriting
spring.cloud.gateway.routes[0].id=customer-service-route
spring.cloud.gateway.routes[0].uri=lb://CUSTOMER-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/customers/**
spring.cloud.gateway.routes[0].filters[0]=RewritePath=/api/customers/(?<segment>.*), /customers/${segment}

# Billing Service Route with Path Rewriting
spring.cloud.gateway.routes[1].id=billing-service-route
spring.cloud.gateway.routes[1].uri=lb://BILLING-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/billings/**
spring.cloud.gateway.routes[1].filters[0]=RewritePath=/api/billings/(?<segment>.*), /billings/${segment}

# Caching
spring.cloud.gateway.routes[0].filters[1]=name=ResponseCache
spring.cloud.gateway.routes[1].filters[1]=name=ResponseCache
