spring.application.name=resilience-gateway
server.port=9094

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

spring.cloud.gateway.routes[0].id=greet-resilient-route
spring.cloud.gateway.routes[0].uri=lb://GREET-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/greet/**
spring.cloud.gateway.routes[0].filters[0]=name=CircuitBreaker
spring.cloud.gateway.routes[0].filters[0].args.name=greetServiceCircuitBreaker
spring.cloud.gateway.routes[0].filters[0].args.fallbackUri=forward:/fallback/greet

spring.cloud.gateway.routes[1].id=account-resilient-route
spring.cloud.gateway.routes[1].uri=lb://ACCOUNT-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/account/**
spring.cloud.gateway.routes[1].filters[0]=name=CircuitBreaker
spring.cloud.gateway.routes[1].filters[0].args.name=accountServiceCircuitBreaker
spring.cloud.gateway.routes[1].filters[0].args.fallbackUri=forward:/fallback/account

spring.cloud.gateway.routes[2].id=loan-resilient-route
spring.cloud.gateway.routes[2].uri=lb://LOAN-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/loan/**
spring.cloud.gateway.routes[2].filters[0]=name=CircuitBreaker
spring.cloud.gateway.routes[2].filters[0].args.name=loanServiceCircuitBreaker
spring.cloud.gateway.routes[2].filters[0].args.fallbackUri=forward:/fallback/loan

# Time Limiter
spring.cloud.gateway.routes[0].filters[1]=name=RequestRateLimiter

spring.cloud.gateway.locator.lower-case-service-id=true

resilience4j.circuitbreaker.configs.default.registerHealthIndicator=true
resilience4j.circuitbreaker.configs.default.slidingWindowSize=10
resilience4j.circuitbreaker.configs.default.minimumNumberOfCalls=5
resilience4j.circuitbreaker.configs.default.failureRateThreshold=50
resilience4j.circuitbreaker.configs.default.waitDurationInOpenState=10s
resilience4j.circuitbreaker.configs.default.permittedNumberOfCallsInHalfOpenState=3

resilience4j.timelimiter.configs.default.timeoutDuration=3s
